quality_gates:
  - id: P2-G-001
    metric: API smoke pass rate
    threshold: ">=90%"
    enforcement: fail
  - id: P2-G-002
    metric: UI smoke pass rate
    threshold: ">=90%"
    enforcement: fail
  - id: P2-G-003
    metric: Targeted PHPUnit pass rate
    threshold: ">=90%"
    enforcement: fail
  - id: P2-G-004
    metric: Public critical route server errors
    threshold: "0 unexpected 5xx"
    enforcement: fail
  - id: P2-G-005
    metric: API smoke runtime
    threshold: "<=60s"
    enforcement: fail
  - id: P2-G-006
    metric: UI smoke runtime
    threshold: "<=90s"
    enforcement: warn
  - id: P2-G-007
    metric: PHPUnit targeted runtime
    threshold: "<=90s"
    enforcement: warn
  - id: P2-G-008
    metric: Coverage driver availability
    threshold: "pcov or xdebug"
    enforcement: warn
