quality_gates:
  - id: P2-QG-001
    tier: current_enforced
    metric: API smoke critical endpoint success
    threshold: ">=90 percent pass-rate"
    importance: high
    enforcement: fail
    implementedInCi: true
  - id: P2-QG-002
    tier: current_enforced
    metric: Critical UI public regression success
    threshold: ">=90 percent pass-rate"
    importance: high
    enforcement: fail
    implementedInCi: true
  - id: P2-QG-003
    tier: current_enforced
    metric: Critical workflow regression subset PHPUnit
    threshold: ">=90 percent pass-rate excluding skips"
    importance: high
    enforcement: fail
    implementedInCi: true
  - id: P2-QG-004
    tier: current_enforced
    metric: Fatal error crash detection on public routes
    threshold: "0 unexpected HTTP 5xx in critical public smoke"
    importance: high
    enforcement: fail
    implementedInCi: true
  - id: P2-QG-005
    tier: current_enforced
    metric: Role access protection validation
    threshold: ">=85 percent pass-rate across role-boundary smoke checks"
    importance: high
    enforcement: fail
    implementedInCi: true
  - id: P2-QG-006
    tier: current_enforced
    metric: Coverage availability status in measured environment
    threshold: "Coverage driver available pcov or xdebug"
