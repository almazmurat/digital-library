    enforcement: informational
    implementedInCi: false
  - id: P2-QG-010
    tier: proposed_next_stage
    metric: Regression success for critical workflows
    threshold: "100 percent pass-rate"
    importance: high
    enforcement: informational
    implementedInCi: false
  - id: P2-QG-011
    tier: proposed_next_stage
    metric: Static analysis major violations
    threshold: "0 major violations"
