name: phase2-automation-gates

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phase2-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate required Phase 2 artifacts
        run: |
          test -f qa/phase2/metrics/phase2-quality-gate-results.csv
          test -f qa/phase2/evidence/logs/phase2-automation-summary.log
          test -f qa/phase2/docs/phase2-final-summary.md

      - name: Fail on fail-level gate breaches
        run: |
          if grep -q ',Fail,' qa/phase2/metrics/phase2-quality-gate-results.csv; then
            echo "Phase 2 quality gate failure detected"
            exit 1
          fi

      - name: Upload phase2 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase2-qa-artifacts
          path: |
            qa/phase2/metrics
            qa/phase2/evidence/logs
            qa/phase2/reports
